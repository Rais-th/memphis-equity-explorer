name: Refresh Memphis data

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci --legacy-peer-deps
      - run: npm run refresh
      - name: Commit updated data
        run: |
          git config user.name "memphis-equity-bot"
          git config user.email "noreply@popuzar.com"
          git add public/data
          if git diff --cached --quiet; then
            echo "No data changes."
            exit 0
          fi
          git commit -m "chore: nightly data refresh $(date -u +%F)"
          git push
